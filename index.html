          <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
        );

        const playAudio = (text) => {
          if ('speechSynthesis' in window) {
            // Cancel any ongoing speech
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            window.speechSynthesis.speak(utterance);
          } else {
             console.warn("Speech Synthesis is not supported in this browser.");
          }
        };

        const Flashcards = () => {
          const [index, setIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);

          const nextCard = () => {
            setIsFlipped(false);
            setIndex((prev) => (prev + 1) % VOCABULARY.length);
          };
          const prevCard = () => {
            setIsFlipped(false);
            setIndex((prev) => (prev - 1 + VOCABULARY.length) % VOCABULARY.length);
          };

          const current = VOCABULARY[index];

          return (
            <div className="flex flex-col items-center justify-center p-6 w-full max-w-2xl mx-auto">
              <div 
                className="w-full h-80 perspective-1000 cursor-pointer relative"
                onClick={() => setIsFlipped(!isFlipped)}
              >
                <div className={`w-full h-full duration-500 preserve-3d absolute top-0 left-0 ${isFlipped ? 'rotate-y-180' : ''}`}>
                  
                  {/* Front */}
                  <div className="absolute w-full h-full backface-hidden bg-white border-2 border-indigo-100 rounded-2xl shadow-lg flex flex-col items-center justify-center p-8">
                    <h1 className="text-8xl font-bold text-gray-800 mb-4">{current.hanzi}</h1>
                    <p className="text-3xl text-indigo-500 mb-6">{current.pinyin}</p>
                    <button 
                      onClick={(e) => { e.stopPropagation(); playAudio(current.hanzi); }}
                      className="p-3 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition"
                      aria-label="Play pronunciation"
                    >
                      <AudioIcon />
                    </button>
                  </div>

                  {/* Back */}
                  <div className="absolute w-full h-full backface-hidden bg-indigo-600 text-white border-2 border-indigo-600 rounded-2xl shadow-lg flex flex-col items-center justify-center p-8 rotate-y-180">
                    <div className="text-center space-y-4">
                      <p className="text-2xl font-bold border-b border-indigo-400 pb-2">🇺🇿 {current.uz}</p>
                      <p className="text-xl">🇷🇺 {current.ru}</p>
                      <p className="text-xl">🇬🇧 {current.en}</p>
                    </div>
                    <button 
                      onClick={(e) => { e.stopPropagation(); playAudio(current.hanzi); }}
                      className="mt-8 p-3 bg-indigo-500 text-white rounded-full hover:bg-indigo-400 transition"
                      aria-label="Play pronunciation"
                    >
                      <AudioIcon />
                    </button>
                  </div>
                </div>
              </div>
              <div className="flex justify-between w-full mt-8">
                <button onClick={prevCard} className="px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition text-gray-700">Oldingi</button>
                <span className="text-gray-500 font-medium self-center">{index + 1} / {VOCABULARY.length}</span>
                <button onClick={nextCard} className="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">Keyingi</button>
              </div>
            </div>
          );
        };

        const VocabTest = () => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [finished, setFinished] = useState(false);

          const handleAnswer = (opt) => {
            if (opt === VOCAB_TEST[currentQ].answer) {
              setScore(score + 1);
            }
            if (currentQ + 1 < VOCAB_TEST.length) {
              setCurrentQ(currentQ + 1);
            } else {
              setFinished(true);
            }
          };

          if (finished) {
            return (
              <div className="text-center p-12 bg-white rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto">
                <h2 className="text-3xl font-bold text-gray-800 mb-4">Test yakunlandi!</h2>
                <p className="text-xl text-gray-600 mb-8">Sizning natijangiz: {score} / {VOCAB_TEST.length}</p>
                <button onClick={() => { setFinished(false); setCurrentQ(0); setScore(0); }} className="px-8 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition">Qayta boshlash</button>
              </div>
            );
          }

          return (
            <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
              <div className="mb-8">
                <span className="text-sm font-semibold text-indigo-500 uppercase tracking-wider">Savol {currentQ + 1} / {VOCAB_TEST.length}</span>
                <h2 className="text-lg text-gray-500 mt-2">Quyidagi so'zning to'g'ri tarjimasini tanlang:</h2>
                <h3 className="text-6xl font-bold mt-6 mb-8 text-gray-800">{VOCAB_TEST[currentQ].q}</h3>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {VOCAB_TEST[currentQ].options.map((opt, i) => (
                  <button key={i} onClick={() => handleAnswer(opt)} className="p-4 border-2 border-gray-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition text-lg text-gray-700 shadow-sm">
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        const Dialogues = () => {
          const [activeDialog, setActiveDialog] = useState(0);

          return (
            <div className="max-w-4xl mx-auto">
              <div className="flex flex-wrap gap-2 mb-6">
                {DIALOGUES.map((d, i) => (
                  <button 
                    key={i} 
                    onClick={() => setActiveDialog(i)}
                    className={`px-4 py-2 rounded-lg font-medium transition ${activeDialog === i ? 'bg-indigo-600 text-white shadow' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                  >
                    {d.title}
                  </button>
                ))}
              </div>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 space-y-6">
                {DIALOGUES[activeDialog].lines.map((line, idx) => (
                  <div key={idx} className="flex gap-4 border-b border-gray-50 pb-6 last:border-0 last:pb-0">
                    <button onClick={() => playAudio(line.hanzi)} className="shrink-0 mt-1 p-2 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition h-10 w-10 flex items-center justify-center">
                      <AudioIcon />
                    </button>
                    <div>
                      {line.speaker && <span className="text-sm font-bold text-gray-400 uppercase tracking-wide">{line.speaker}</span>}
                      <p className="text-2xl font-bold text-gray-800 mt-1">{line.hanzi}</p>
                      <p className="text-lg text-indigo-500 mb-3 font-medium">{line.pinyin}</p>
                      <div className="space-y-1">
                        <p className="text-sm text-gray-600"><span className="font-semibold text-gray-400 w-8 inline-block">UZ:</span> {line.uz}</p>
                        <p className="text-sm text-gray-600"><span className="font-semibold text-gray-400 w-8 inline-block">RU:</span> {line.ru}</p>
                        <p className="text-sm text-gray-600"><span className="font-semibold text-gray-400 w-8 inline-block">EN:</span> {line.en}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const Grammar = () => (
          <div className="max-w-4xl mx-auto space-y-8">
            {GRAMMAR.map((g, idx) => (
              <div key={idx} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
                <h2 className="text-2xl font-bold text-gray-800 mb-6 pb-4 border-b border-gray-100">{g.title}</h2>
                <div className="space-y-4 mb-8 bg-gray-50 p-6 rounded-xl border border-gray-100">
                  <p className="text-gray-700 leading-relaxed">🇺🇿 {g.uz}</p>
                  <p className="text-gray-700 leading-relaxed">🇷🇺 {g.ru}</p>
                  <p className="text-gray-700 leading-relaxed">🇬🇧 {g.en}</p>
                </div>
                <h3 className="text-lg font-semibold text-gray-800 mb-4">Examples (Misollar):</h3>
                <ul className="space-y-4">
                  {g.examples.map((ex, i) => (
                    <li key={i} className="flex items-center gap-3 bg-gray-50/50 p-3 rounded-lg">
                      <button onClick={() => playAudio(ex)} className="p-2 text-indigo-400 hover:text-indigo-600 transition bg-white rounded-full shadow-sm"><AudioIcon /></button>
                      <span className="text-xl text-gray-700 font-medium">{ex}</span>
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        );

        const GrammarTest = () => {
          const [currentQ, setCurrentQ] = useState(0);
          const [score, setScore] = useState(0);
          const [finished, setFinished] = useState(false);

          const handleAnswer = (opt) => {
            if (opt === GRAMMAR_TEST[currentQ].answer) {
              setScore(score + 1);
            }
            if (currentQ + 1 < GRAMMAR_TEST.length) {
              setCurrentQ(currentQ + 1);
            } else {
              setFinished(true);
            }
          };

          if (finished) {
            return (
              <div className="text-center p-12 bg-white rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto">
                <h2 className="text-3xl font-bold text-gray-800 mb-4">测试结束！</h2>
                <p className="text-xl text-gray-600 mb-8">分数： {score} / {GRAMMAR_TEST.length}</p>
                <button onClick={() => { setFinished(false); setCurrentQ(0); setScore(0); }} className="px-8 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition shadow">再来一次</button>
              </div>
            );
          }

          return (
            <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
              <div className="mb-8">
                <span className="text-sm font-semibold text-indigo-500 tracking-wider">问题 {currentQ + 1} / {GRAMMAR_TEST.length}</span>
                <h2 className="text-lg text-gray-500 mt-2">请选择正确的答案：</h2>
                <h3 className="text-3xl font-bold mt-8 mb-10 text-gray-800 leading-relaxed">{GRAMMAR_TEST[currentQ].q}</h3>
              </div>
              <div className="grid grid-cols-2 gap-4">
                {GRAMMAR_TEST[currentQ].options.map((opt, i) => (
                  <button key={i} onClick={() => handleAnswer(opt)} className="p-4 border-2 border-gray-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition text-2xl text-gray-800 font-medium shadow-sm">
                    {opt}
                  </button>
                ))}
              </div>
            </div>
          );
        };

        // --- 主应用组件 (MAIN APP COMPONENT) ---

        function App() {
          const [activeTab, setActiveTab] = useState("kartochkalar");

          const TABS = [
            { id: "kartochkalar", label: "So'zlar kartochkasi" },
            { id: "lugat", label: "Lug'at testi" },
            { id: "dialoglar", label: "Dialoglar" },
            { id: "grammatika", label: "Grammatika" },
            { id: "mashqlar", label: "Grammatika va Mashqlar Testi" }
          ];

          return (
            <div className="flex flex-col min-h-screen">
              <header className="bg-white shadow-sm border-b border-gray-100 pt-8 pb-6 px-6 sticky top-0 z-10">
                <div className="max-w-5xl mx-auto text-center">
                  <h1 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2">HSK 3 - Lesson 14</h1>
                  <p className="text-lg text-indigo-500 font-medium mb-6">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</p>
                  
                  <div className="flex flex-wrap justify-center gap-2">
                    {TABS.map(tab => (
                      <button
                        key={tab.id}
                        onClick={() => setActiveTab(tab.id)}
                        className={`px-4 py-2 rounded-full text-sm font-medium transition-colors ${
                          activeTab === tab.id 
                            ? 'bg-indigo-600 text-white shadow-md' 
                            : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                        }`}
                      >
                        {tab.label}
                      </button>
                    ))}
                  </div>
                </div>
              </header>

              <main className="flex-grow p-6 py-12">
                <div className="max-w-5xl mx-auto">
                  {activeTab === "kartochkalar" && <Flashcards />}
                  {activeTab === "lugat" && <VocabTest />}
                  {activeTab === "dialoglar" && <Dialogues />}
                  {activeTab === "grammatika" && <Grammar />}
                  {activeTab === "mashqlar" && <GrammarTest />}
                </div>
              </main>

              <footer className="bg-white border-t border-gray-200 py-6 text-center text-sm text-gray-500 mt-auto">
                <p>HSK 3 Standard Course - Lesson 14</p>
                <p className="mt-1">&copy; 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
              </footer>
            </div>
          );
        }

        // 渲染 React 应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
